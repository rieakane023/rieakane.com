services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: rieakane
      POSTGRES_USER: rieakane
      POSTGRES_PASSWORD: rieakane
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rieakane"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: .
    # Apply migrations on startup, then run the dev server (compose overrides the
    # image's production gunicorn CMD — django.md "Docker").
    command: sh -c "python manage.py migrate --noinput && python manage.py runserver 0.0.0.0:8000"
    environment:
      DJANGO_DEBUG: "True"
      DJANGO_SECRET_KEY: "dev-insecure-key-change-in-production"
      DJANGO_ALLOWED_HOSTS: "localhost,127.0.0.1"
      DJANGO_CORS_ALLOWED_ORIGINS: "http://localhost:4200,http://127.0.0.1:4200,http://localhost:4300,http://127.0.0.1:4300"
      DJANGO_REQUIRE_MFA: "False"
      POSTGRES_DB: rieakane
      POSTGRES_USER: rieakane
      POSTGRES_PASSWORD: rieakane
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
