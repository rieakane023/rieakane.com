<header class="topbar">
  <span class="topbar__brand">rieakane.com</span>
  <div class="topbar__controls">
    <label class="control">
      <span class="control__label">Vision</span>
      <select
        class="control__select"
        aria-label="Color-vision-deficiency mode"
        (change)="onCvdChange($event)"
      >
        @for (mode of cvdModes; track mode.value) {
          <option [value]="mode.value" [selected]="mode.value === themeSvc.cvd()">
            {{ mode.label }}
          </option>
        }
      </select>
    </label>
    <button
      type="button"
      class="control__toggle"
      [attr.aria-label]="'Theme: ' + themeLabel() + '. Click to change.'"
      (click)="themeSvc.toggleTheme()"
    >
      Theme: {{ themeLabel() }}
    </button>
  </div>
</header>

<main class="hero">
  <section class="hero__content">
    <p class="hero__eyebrow">Hello, I'm</p>
    <h1 class="hero__title">{{ title() }}</h1>
    <p class="hero__tagline">Personal website — coming soon.</p>

    <p class="hero__status">
      Backend API: <span class="hero__badge">{{ apiStatus() }}</span>
    </p>
  </section>
</main>

<router-outlet />
