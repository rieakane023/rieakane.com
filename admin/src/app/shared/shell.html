<div class="shell">
  <aside class="sidebar">
    <div class="sidebar__brand">
      rieakane<span class="sidebar__brand-dot">.</span>admin
    </div>
    <nav class="sidebar__nav" aria-label="Admin sections">
      @for (item of nav; track item.path) {
        <a
          class="sidebar__link"
          [routerLink]="item.path"
          routerLinkActive="sidebar__link--active"
          ariaCurrentWhenActive="page"
        >
          <span class="sidebar__icon" aria-hidden="true">{{ item.icon }}</span>
          {{ item.label }}
        </a>
      }
    </nav>
  </aside>

  <div class="main">
    <header class="header">
      <div class="header__env" role="status">Internal admin — restricted access</div>
      <div class="spacer"></div>
      <label class="header__control">
        <span class="visually-hidden">Color-vision mode</span>
        <select class="field__select" aria-label="Color-vision-deficiency mode" (change)="onCvdChange($event)">
          @for (mode of cvdModes; track mode.value) {
            <option [value]="mode.value" [selected]="mode.value === themeSvc.cvd()">{{ mode.label }}</option>
          }
        </select>
      </label>
      <button type="button" class="btn btn--ghost" (click)="themeSvc.toggleTheme()">
        Theme: {{ themeLabel() }}
      </button>
      <span class="header__user" title="Signed-in admin and role">{{ userLabel() }}</span>
      <button type="button" class="btn btn--secondary" (click)="logout()">Sign out</button>
    </header>

    <main class="content">
      <router-outlet />
    </main>
  </div>
</div>
