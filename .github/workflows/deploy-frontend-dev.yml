# Deploy the public frontend to the DEV environment (Cloudflare Pages) on every
# push to `development`. See deployments-cloudflare.md.
#
# Required GitHub repo secrets (Settings → Secrets and variables → Actions):
#   CLOUDFLARE_API_TOKEN   - token with the "Cloudflare Pages: Edit" permission
#   CLOUDFLARE_ACCOUNT_ID  - your Cloudflare account id
# Prerequisite: create a Pages project named `rieakane-frontend` (see vars below).
name: deploy-frontend-dev

on:
  push:
    branches: [development]
    paths:
      - 'frontend/**'
      - 'shared/**'
      - '.github/workflows/deploy-frontend-dev.yml'
  workflow_dispatch: # allow manual runs

# One in-flight deploy per branch; cancel superseded runs.
concurrency:
  group: deploy-frontend-dev-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CF_PROJECT: rieakane-frontend # Cloudflare Pages project name

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install (clean, from lockfile)
        run: npm ci

      - name: Unit tests (gate)
        run: npx ng test --watch=false

      - name: Production build
        run: npx ng build --configuration production

      - name: Deploy to Cloudflare Pages (dev)
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          # dist path is <root>/dist/<project>/browser for the application builder.
          command: >-
            pages deploy frontend/dist/frontend/browser
            --project-name=${{ env.CF_PROJECT }}
            --branch=development
          workingDirectory: '.'
